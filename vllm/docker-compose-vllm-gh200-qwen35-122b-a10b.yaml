# Qwen3.5-122B-A10B (default Hub BF16/F32 safetensors) + vLLM on NVIDIA GH200 (linux/arm64 + CUDA).
# Model card: https://huggingface.co/Qwen/Qwen3.5-122B-A10B
#
# Smaller checkpoints on GH200 (same architecture, different repo):
#   - docker-compose-vllm-gh200-qwen35-122b.yaml — Qwen3.5-122B-A10B-FP8
#   - docker-compose-vllm-gh200-qwen35-122b-gptq-int4.yaml — GPTQ Int4
#
# GH200 sizing (typical ~96 GB HBM3 per Hopper GPU; nvidia-smi shows that per “GPU 0”):
#   - 122B MoE BF16 weights are heavier than the FP8 variant: expect higher host RAM / --cpu-offload-gb needs,
#     or more GPUs (HF vLLM example: --tensor-parallel-size 8, --max-model-len 262144).
#   - Set VLLM_TENSOR_PARALLEL_SIZE to the number of physical GPUs you expose. `gpus: all` passes every GPU;
#     TP must match that count.
#   - If you only have one GH200, prefer the FP8 or GPTQ compose above, or a smaller model
#     (docker-compose-vllm-gh200-qwen35-9b.yaml / docker-compose-vllm-gh200-qwen35-27b.yaml / docker-compose-vllm-gh200-qwen35-35b-a3b.yaml).
#   - Cutting VLLM_MAX_MODEL_LEN helps KV pressure after load; it does not fix MoE weight OOM on TP=1 by itself.
#   - vLLM 0.19+ `vllm serve` uses the V1 engine.
#   - --cpu-offload-gb > 0: prefer vllm/vllm-openai:nightly + --cpu-offload-params experts + --cpu-offload-gb
#     (https://docs.vllm.ai/en/latest/cli/serve/#-cpu-offload-params ).
#   - If PyTorch suggests PYTORCH_ALLOC_CONF=expandable_segments:True but “reserved unallocated” is tiny, the failure is
#     real OOM during weight creation — raise VLLM_CPU_OFFLOAD_GB, add GPUs/TP, or switch to FP8/GPTQ (not fragmentation).
#
# Prerequisites: recent NVIDIA driver, NVIDIA Container Toolkit, Docker with GPU support; run from repo root
# so `.env` and `./vllm-models` resolve. `platform: linux/arm64` matches GH200 userland.
#
# Build + run:
#   docker compose -f docker-compose-vllm-gh200-qwen35-122b-a10b.yaml build vllm
#   docker compose -f docker-compose-vllm-gh200-qwen35-122b-a10b.yaml up -d
#
# Example .env for an 8×GPU node (matches HF vLLM recipe scale):
#   VLLM_TENSOR_PARALLEL_SIZE=8
#   VLLM_MAX_MODEL_LEN=262144
#   VLLM_GPU_MEMORY_UTILIZATION=0.88
#
# Single-GH200 (~96 GiB HBM): BF16 122B MoE rarely fits TP=1 without substantial expert offload. Unset
#   VLLM_CPU_OFFLOAD_GB with TP=1 defaults to 48 GiB offload + VLLM_CPU_OFFLOAD_PARAMS=experts (override in .env).
#   BF16 may need a higher VLLM_CPU_OFFLOAD_GB than FP8; if serve fails, use docker-compose-vllm-gh200-qwen35-122b.yaml
#   (FP8) or raise TP across more GPUs.
#
# Memory tuning: https://docs.vllm.ai/en/latest/configuration/conserving_memory/
#
# Image: Dockerfile.vllm-openai-qwen35 on vllm/vllm-openai (Transformers 5.x for Qwen3.5 MoE). Override
# VLLM_BASE_IMAGE / skip build with VLLM_IMAGE if you use a pre-built image.
#
# Env (see vLLM CacheConfig / serve docs):
#   VLLM_TENSOR_PARALLEL_SIZE (default 1), VLLM_MAX_MODEL_LEN (default 131072),
#   VLLM_GPU_MEMORY_UTILIZATION (default 0.88), VLLM_HOST_PORT (default 8000),
#   VLLM_ENABLE_SWAP_SPACE=1 + VLLM_SWAP_SPACE (GiB/GPU) only on vLLM builds that still support --swap-space.
#   VLLM_KV_CACHE_DTYPE (default auto),
#   VLLM_CPU_OFFLOAD_GB (per GPU; unset + TP=1 defaults to 48 — set 0 to disable). Use nightly + VLLM_CPU_OFFLOAD_PARAMS.
#   VLLM_CPU_OFFLOAD_PARAMS (optional; when COFF>0: unset → default segment experts; empty → no --cpu-offload-params),
#   VLLM_KV_CACHE_MEMORY_BYTES, VLLM_CALCULATE_KV_SCALES, VLLM_ENABLE_EXPERT_PARALLEL,
#   VLLM_MAX_PARALLEL_LOADING_WORKERS, VLLM_KV_OFFLOADING_SIZE + VLLM_KV_OFFLOADING_BACKEND,
#   VLLM_ENFORCE_EAGER=1 for --enforce-eager.
# PYTORCH_ALLOC_CONF / CUDA_MANAGED_FORCE_DEVICE_ALLOC set in `environment` and re-exported in the start script.
# Repo-root .env: HF_TOKEN, VLLM_* — loaded via env_file.
#
# Default serve uses --language-model-only (HF model card): text/chat only, skips vision encoder. For image/video,
# remove that flag and use a full snapshot (preprocessor_config.json / vision assets); re-run model-download if missing.

services:
  model-download:
    platform: linux/arm64
    image: python:3.12-slim
    env_file:
      - path: .env
        required: false
    volumes:
      - ./vllm-models:/models
    command:
      - /bin/sh
      - -c
      - |
        set -e
        python -m pip install -q --no-cache-dir huggingface_hub hf_transfer
        export HF_HUB_ENABLE_HF_TRANSFER=1
        if [ -f /models/Qwen3.5-122B-A10B/config.json ]; then
          echo "Model already present; skipping download."
          exit 0
        fi
        echo "Downloading Qwen/Qwen3.5-122B-A10B (very large BF16 snapshot, one-time)..."
        python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='Qwen/Qwen3.5-122B-A10B', local_dir='/models/Qwen3.5-122B-A10B', local_dir_use_symlinks=False)"
    restart: "no"

  vllm:
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile.vllm-openai-qwen35
      args:
        VLLM_BASE_IMAGE: ${VLLM_BASE_IMAGE:-vllm/vllm-openai:nightly}
        TRANSFORMERS_VERSION: ${TRANSFORMERS_VERSION:-5.5.0}
        HUGGINGFACE_HUB_VERSION: ${HUGGINGFACE_HUB_VERSION:-1.8.0}
    image: ${VLLM_IMAGE:-vllm-openai-qwen35:latest}
    container_name: vllm-qwen35-122b-a10b
    env_file:
      - path: .env
        required: false
    depends_on:
      model-download:
        condition: service_completed_successfully
    volumes:
      - ./vllm-models:/models
    environment:
      - HF_HOME=/models/.cache/huggingface
      - PYTORCH_ALLOC_CONF=${PYTORCH_ALLOC_CONF:-expandable_segments:True}
      - CUDA_MANAGED_FORCE_DEVICE_ALLOC=${CUDA_MANAGED_FORCE_DEVICE_ALLOC:-1}
    ports:
      - "${VLLM_HOST_PORT:-8000}:8000"
    ipc: host
    shm_size: 16gb
    gpus: all
    # vllm images use ENTRYPOINT ["vllm"]; override so /bin/sh runs the script (otherwise -c is parsed as --compilation-config).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        export PYTORCH_ALLOC_CONF="$${PYTORCH_ALLOC_CONF:-expandable_segments:True}"
        export CUDA_MANAGED_FORCE_DEVICE_ALLOC="$${CUDA_MANAGED_FORCE_DEVICE_ALLOC:-1}"
        TP="$${VLLM_TENSOR_PARALLEL_SIZE:-1}"
        if command -v nvidia-smi >/dev/null 2>&1; then
          echo "=== GPUs visible in container (nvidia-smi -L) ==="
          nvidia-smi -L 2>/dev/null || true
        fi
        echo "=== vLLM tensor_parallel_size=$$TP (must match GPU count above for 122B-A10B BF16) ==="
        if [ -z "$${VLLM_CPU_OFFLOAD_GB+x}" ]; then
          if [ "$$TP" = "1" ]; then
            COFF=48
          else
            COFF=0
          fi
        else
          COFF="$${VLLM_CPU_OFFLOAD_GB}"
        fi
        echo "=== --cpu-offload-gb $$COFF ==="
        OPT_CPU_OFFLOAD_PARAMS=""
        if [ "$${COFF:-0}" -gt 0 ] 2>/dev/null; then
          if [ -z "$${VLLM_CPU_OFFLOAD_PARAMS+x}" ]; then
            COP="experts"
          else
            COP="$${VLLM_CPU_OFFLOAD_PARAMS}"
          fi
          if [ -n "$$COP" ]; then
            OPT_CPU_OFFLOAD_PARAMS="--cpu-offload-params $$COP"
            echo "=== --cpu-offload-params $$COP ==="
          fi
        fi
        if [ "$${COFF:-0}" -gt 0 ] 2>/dev/null && [ -z "$${OPT_CPU_OFFLOAD_PARAMS:-}" ]; then
          echo "WARN: --cpu-offload-gb > 0 but VLLM_CPU_OFFLOAD_PARAMS is empty (disable selective offload) — may hit V1 KV issues; omit the var for default experts, or use FP8 / GPTQ / multi-GPU." >&2
        elif [ "$$TP" = "1" ] && [ "$${COFF:-0}" -eq 0 ] 2>/dev/null; then
          echo "WARN: TP=1 and --cpu-offload-gb 0 — Qwen3.5-122B-A10B (BF16) typically OOMs while loading MoE weights on ~96 GiB HBM. Set VLLM_CPU_OFFLOAD_GB, use docker-compose-vllm-gh200-qwen35-122b.yaml (FP8), docker-compose-vllm-gh200-qwen35-122b-gptq-int4.yaml, or more GPUs." >&2
        fi
        OPT_SWAP=""
        if [ "$${VLLM_ENABLE_SWAP_SPACE:-0}" = "1" ]; then
          OPT_SWAP="--swap-space $${VLLM_SWAP_SPACE:-256}"
        fi
        OPT_KV_MEM=""
        if [ -n "$${VLLM_KV_CACHE_MEMORY_BYTES:-}" ]; then
          OPT_KV_MEM="--kv-cache-memory-bytes $${VLLM_KV_CACHE_MEMORY_BYTES}"
        fi
        OPT_KV_SCALE=""
        if [ "$${VLLM_CALCULATE_KV_SCALES:-0}" = "1" ]; then
          OPT_KV_SCALE="--calculate-kv-scales"
        fi
        OPT_EP=""
        if [ "$${VLLM_ENABLE_EXPERT_PARALLEL:-0}" = "1" ]; then
          OPT_EP="--enable-expert-parallel"
        fi
        OPT_LOAD=""
        if [ -n "$${VLLM_MAX_PARALLEL_LOADING_WORKERS:-}" ]; then
          OPT_LOAD="--max-parallel-loading-workers $${VLLM_MAX_PARALLEL_LOADING_WORKERS}"
        fi
        OPT_KV_OFF=""
        if [ -n "$${VLLM_KV_OFFLOADING_SIZE:-}" ]; then
          OPT_KV_OFF="--kv-offloading-size $${VLLM_KV_OFFLOADING_SIZE} --kv-offloading-backend $${VLLM_KV_OFFLOADING_BACKEND:-native}"
        fi
        OPT_EAGER=""
        if [ "$${VLLM_ENFORCE_EAGER:-0}" = "1" ]; then
          OPT_EAGER="--enforce-eager"
        fi
        exec vllm serve \
          "/models/Qwen3.5-122B-A10B" \
          --trust-remote-code \
          --served-model-name "Qwen/Qwen3.5-122B-A10B" \
          --host 0.0.0.0 \
          --port 8000 \
          --tensor-parallel-size "$${VLLM_TENSOR_PARALLEL_SIZE:-1}" \
          --max-model-len "$${VLLM_MAX_MODEL_LEN:-131072}" \
          --reasoning-parser qwen3 \
          --gpu-memory-utilization "$${VLLM_GPU_MEMORY_UTILIZATION:-0.88}" \
          $$OPT_SWAP \
          --kv-cache-dtype "$${VLLM_KV_CACHE_DTYPE:-auto}" \
          --cpu-offload-gb "$$COFF" \
          $$OPT_CPU_OFFLOAD_PARAMS \
          $$OPT_KV_MEM \
          $$OPT_KV_SCALE \
          $$OPT_EP \
          $$OPT_LOAD \
          $$OPT_KV_OFF \
          $$OPT_EAGER \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --language-model-only
    restart: unless-stopped
