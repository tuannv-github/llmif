# vLLM + Qwen2.5-32B-Instruct for ARM64 + H100 / GH200 (vLLM 0.8.x; Qwen3.5 MoE needs newer TF/vLLM).
# Image: drikster80/vllm-gh200-openai — https://hub.docker.com/r/drikster80/vllm-gh200-openai
# Other ARM64 (non-H100): consider drikster80/vllm-aarch64-openai per image maintainer.
# x86_64: use docker-compose-vllm.yaml instead.
#
# Standalone:
#   docker compose -f docker-compose-vllm-gh200.yaml up -d
# With main Open WebUI stack:
#   docker compose -f docker-compose.yaml -f docker-compose-vllm-gh200.yaml up -d
# Optional: HF_TOKEN=... if the hub asks for auth.

services:
  model-download:
    image: python:3.12-slim
    volumes:
      - ./vllm-models:/models
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command:
      - /bin/sh
      - -c
      - |
        set -e
        python -m pip install -q --no-cache-dir huggingface_hub hf_transfer
        export HF_HUB_ENABLE_HF_TRANSFER=1
        if [ -f /models/Qwen2.5-32B-Instruct/config.json ]; then
          echo "Model already present; skipping download."
          exit 0
        fi
        echo "Downloading Qwen/Qwen2.5-32B-Instruct (large, one-time)..."
        python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='Qwen/Qwen2.5-32B-Instruct', local_dir='/models/Qwen2.5-32B-Instruct', local_dir_use_symlinks=False)"
    restart: "no"

  vllm:
    image: drikster80/vllm-gh200-openai:latest
    container_name: vllm
    depends_on:
      model-download:
        condition: service_completed_successfully
    volumes:
      - ./vllm-models:/models
    environment:
      - HF_HOME=/models/.cache/huggingface
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "8000:8000"
    ipc: host
    shm_size: 16gb
    gpus: all
    command:
      - "/models/Qwen2.5-32B-Instruct"
      - "--served-model-name"
      - "qwen2.5-32b"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--max-model-len"
      - "32768"
      - "--gpu-memory-utilization"
      - "0.90"
      # Required for OpenAI-compatible clients (e.g. OpenClaw) that send tool_choice: "auto"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
    restart: unless-stopped
